<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel Catalog</title>
<style>
  body { background:#0B0E11; color:#EAECEF; font-family:Arial; margin:0; padding:0; }
  .container { max-width:900px; margin:0 auto; padding:30px 20px; }
  h1,h2,h3 { color:#F0B90B; }
  .card { background:#1E2329; border:1px solid #2B3139; border-radius:8px; padding:20px; margin:20px 0; }
  button, .btn { background:#F0B90B; color:#0B0E11; border:none; padding:12px 24px; font-weight:bold; border-radius:4px; cursor:pointer; }
  button:hover { background:#FCD535; }
  input[type="text"] { padding:10px; border:1px solid #F0B90B; background:#1E2329; color:#EAECEF; border-radius:4px; width:250px; }
  img { border:2px solid #F0B90B; border-radius:8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Carousel Catalog</h1>
  <div class="card">
    <h2>Commander Deck Diagnostic</h2>
    <p>Find out exactly why your deck feels inconsistent.  NZD.</p>
    <a class="btn" href="https://your-payment-link.com">Get Diagnostic</a>
  </div>

  <h3>Free Avatar Generator</h3>
  <input type="text" id="avatarName" placeholder="Enter a name or phrase">
  <button onclick="generateAvatar()">Generate Avatar</button>
  <br><br>
  <canvas id="avatarCanvas" width="120" height="120" style="display:none;"></canvas>
  <script>
    function generateAvatar() {
      const name = document.getElementById('avatarName').value.trim() || 'guest';
      const canvas = document.getElementById('avatarCanvas');
      canvas.style.display = 'block';
      const ctx = canvas.getContext('2d');
      const seed = name.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
      ctx.fillStyle = '#0B0E11';
      ctx.fillRect(0,0,120,120);
      ctx.fillStyle = '#F0B90B';
      ctx.fillRect(30,40,60,20);
      ctx.fillRect(45,60,30,10);
      ctx.fillStyle = '#1E2329';
      ctx.beginPath(); ctx.arc(60,60,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#F0B90B';
      ctx.font = '10px Arial'; ctx.fillText(name.substring(0,4), 40, 110);
    }
  </script>
</div>
</body>
</html>
